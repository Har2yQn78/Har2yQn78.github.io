<svg viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(255,255,255,0.4)" />
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee" />
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="620" fill="#0a0a0a" />

  <!-- RLS boundary -->
  <rect x="24" y="168" width="600" height="330" rx="10" fill="none" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="4 5" />
  <text x="40" y="192" fill="#22d3ee" fill-opacity="0.8" font-size="11" letter-spacing="1.5">TENANT-SCOPED · ROW-LEVEL SECURITY</text>

  <!-- Row 1: entry point -->
  <rect x="370" y="40" width="240" height="64" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="490" y="78" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">End Users</text>

  <!-- Row 2: backend -->
  <rect x="60" y="216" width="220" height="90" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="170" y="248" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Ingestion</text>
  <text x="170" y="268" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">Celery worker</text>
  <text x="170" y="286" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">chunk → embed → store</text>

  <rect x="360" y="216" width="240" height="90" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="480" y="248" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">RAG pipeline</text>
  <text x="480" y="268" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">retrieve → rerank → generate</text>
  <rect x="410" y="278" width="140" height="20" rx="10" fill="none" stroke="#22d3ee" stroke-opacity="0.6" />
  <text x="480" y="292" fill="#22d3ee" font-size="10" text-anchor="middle">groundedness gate</text>

  <!-- Row 3: data -->
  <rect x="60" y="380" width="220" height="64" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="170" y="406" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Postgres + pgvector</text>
  <text x="170" y="426" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">RLS enforced per tenant</text>

  <rect x="360" y="380" width="240" height="64" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="480" y="406" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Redis</text>
  <text x="480" y="426" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">cache · queue · pub/sub</text>

  <!-- Row 4: external (outside RLS boundary, BYOK) -->
  <rect x="700" y="216" width="240" height="64" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="820" y="242" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">LLM</text>
  <text x="820" y="262" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">bot's own credential — BYOK</text>

  <rect x="700" y="308" width="240" height="64" rx="8" fill="#111214" stroke="rgba(255,255,255,0.18)" />
  <text x="820" y="334" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Embedding</text>
  <text x="820" y="354" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">bot's own credential — BYOK</text>

  <!-- Arrows -->
  <path d="M470,104 C465,150 475,180 480,216" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" />
  <path d="M420,104 C300,150 210,170 175,216" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" />
  <text x="330" y="152" fill="rgba(255,255,255,0.4)" font-size="10">upload PDF</text>

  <path d="M170,306 L170,380" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <path d="M480,306 L480,380" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <path d="M280,340 L360,340" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrow)" />

  <path d="M280,250 L360,250" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" marker-end="url(#arrow)" />

  <path d="M600,240 L700,248" fill="none" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#arrowCyan)" />
  <path d="M600,270 C650,290 660,330 700,338" fill="none" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#arrowCyan)" />
  <path d="M280,260 C400,300 500,320 700,338" fill="none" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#arrowCyan)" />

  <text x="820" y="470" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">outside RLS — belongs to the tenant, not Pulse</text>
</svg>
